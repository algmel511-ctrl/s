name: Build Taiwan Offset Validator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات مشروعك من المستودع (مهم جداً عشان السيرفر يشوف ملفاتك)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. أكشن جاهز يحمل الـ Theos والـ Toolchain والـ SDK تلقائياً ويحل مشكلة Clang
      - name: Setup Theos Environment
        uses: beerpiss/theos-action@v1
        with:
          theos-dir: ${{ github.workspace }}/theos

      # 3. تشغيل أمر التجميع لإنتاج حزمة الـ Deb
      - name: Build Tweak Package
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1

      # 4. رفع الملف الناتج عشان تحمله
      - name: Upload Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: TaiwanValidator-Package
          path: packages/*.deb
