name: Build iOS Dylib (Theos)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: List files for debugging
        run: ls -la

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: brew install ldid dpkg

      - name: Build Tweak
        run: make

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OffsetsValidator.dylib
          path: ./.theos/obj/**/OffsetsValidator.dylib   # ← المسار الصحيح هنا
