name: Build iOS Dylib (Theos)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install Dependencies (ldid, etc)
        run: |
          brew install ldid dpkg

      - name: Build Tweak
        run: make

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v2
        with:
          name: OffsetsValidator.dylib
          path: ./*.dylib
