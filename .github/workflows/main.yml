name: Build iOS Dylib (Theos)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: brew install ldid dpkg

      - name: Build Tweak
        run: make

      # 🔥 الخطوة السحرية: تبحث عن أي ملف .dylib في كل المجلدات
      - name: Find and upload dylib
        run: |
          DYLIB_PATH=$(find . -name "*.dylib" -type f | head -n 1)
          echo "✅ Found dylib at: $DYLIB_PATH"
          
          # إذا كان الملف موجود، نرفعه
          if [ -f "$DYLIB_PATH" ]; then
            mkdir -p output
            cp "$DYLIB_PATH" output/OffsetsValidator.dylib
            echo "✅ Copied to output/OffsetsValidator.dylib"
          else
            echo "❌ No dylib found!"
            exit 1
          fi

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OffsetsValidator.dylib
          path: output/OffsetsValidator.dylib
