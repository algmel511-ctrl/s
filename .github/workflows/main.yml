name: Build Taiwan Offset Validator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من الـ Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة نظام Linux وتثبيت الأدوات الأساسية
      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot build-essential perl clang libssl-dev

      # 3. تثبيت بيئة Theos وتجنب خطأ المجلد الموجود مسبقاً
      - name: Install Theos SDK
        run: |
          rm -rf $GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      # 4. جلب الـ SDK الخاص بـ iOS مع مسح أي مخلفات سابقة
      - name: Checkout iOS SDK
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks
          
      # 5. تشغيل أمر التجميع لإنتاج حزمة الـ Deb مباشرة
      - name: Compile Tweak Package
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1

      # 6. رفع ملف الـ .deb الناتج للتحميل
      - name: Upload Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaiwanValidator-Package
          path: packages/*.deb
