name: Build Taiwan Offset Validator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات مشروعك من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. تثبيت الأدوات الأساسية لنظام الـ Linux
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot build-essential perl clang libssl-dev xz-utils curl

      # 3. تحميل الـ Theos الأساسي يدوياً
      - name: Install Theos
        run: |
          rm -rf $GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      # 4. تحميل المترجم الرسمي (Toolchain) وفك ضغطه بأمان
      - name: Install iOS Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain/linux/iphone
          curl -LO https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma
          tar -xf linux-ios-arm64e-clang-toolchain.tar.lzma -C $GITHUB_WORKSPACE/theos/toolchain/linux/iphone --strip-components=1
          rm linux-ios-arm64e-clang-toolchain.tar.lzma

      # 5. جلب الـ SDKs الخاصة بالـ iOS
      - name: Checkout iOS SDKs
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks

      # 6. التجميع النهائي وإنتاج الـ Deb
      - name: Build Tweak Package
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1

      # 7. رفع الملف الناتج للتحميل من الـ Artifacts
      - name: Upload Compiled Package
        uses: actions/upload-artifact@v4
        with:
          name: TaiwanValidator-Package
          path: packages/*.deb
